name: Deploy Application to Server

on:
  push:
    branches:
      - main
      - feature/new-grading  # 【修改点 1】：新增对新分支的监听
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 注意：这里依然推送到 latest 标签。
          # 如果您想严格区分镜像版本，可以将其改为 :new 等标签，并在 docker-compose-new.yml 中同步修改。
          # 但为了简单起见，这里保持 latest，靠服务器上的不同 compose 文件来区分运行。
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/234-deploylab-backend:latest 

      - name: Copy file via ssh password
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          # 【修改点 2】：将新分支的 compose 文件复制到新的目录
          # 注意：这里假设您把新文件命名为 docker-compose-new.yml 并放在了项目根目录
          source: "docker-compose-new.yml" 
          target: "/home/ubuntu/backend-new" 

      - name: Docker compose
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 【修改点 3】：进入新的目录
            cd /home/ubuntu/backend-new
            
            echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login --username ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
            
            # 【修改点 4】：使用 -f 指定新的 compose 文件，并使用 -p 指定项目名防止容器名冲突
            docker compose -f docker-compose-new.yml -p backend-new down
            docker compose -f docker-compose-new.yml -p backend-new pull
            docker compose -f docker-compose-new.yml -p backend-new up -d
            
            # 清理临时文件
            rm -rf /home/ubuntu/backend-new